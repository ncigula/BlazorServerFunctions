name: Benchmarks

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build benchmarks project
        run: dotnet build tests/BlazorServerFunctions.Benchmarks -c Release

      - name: Run benchmarks
        run: |
          echo "Running benchmarks..."
          dotnet run -c Release --project tests/BlazorServerFunctions.Benchmarks --no-build -- \
            --exporters json \
            --artifacts ./benchmark-artifacts

      - name: Debug: Show working directory
        run: pwd

      - name: Debug: List all files recursively
        run: ls -R .

      - name: Debug: Check benchmark-artifacts existence
        run: |
          if [ ! -d "./benchmark-artifacts" ]; then
            echo "❌ benchmark-artifacts directory NOT FOUND"
            exit 1
          fi
          echo "benchmark-artifacts directory exists"

      - name: Debug: List benchmark-artifacts
        run: ls -R ./benchmark-artifacts

      - name: Store FullGenerationBenchmarks results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: benchmarkdotnet
          output-file-path: ./benchmark-artifacts/FullGenerationBenchmarks/FullGenerationBenchmarks-report.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: true
          alert-threshold: '150%'
          fail-on-alert: true

      - name: Store IncrementalGenerationBenchmarks results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: benchmarkdotnet
          output-file-path: ./benchmark-artifacts/IncrementalGenerationBenchmarks/IncrementalGenerationBenchmarks-report.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: true
          alert-threshold: '150%'
          fail-on-alert: true

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: benchmark-artifacts/
