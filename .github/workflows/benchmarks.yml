name: Benchmarks

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  # Required for github-action-benchmark to push results to gh-pages
  contents: write

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build benchmarks project
        run: dotnet build tests/BlazorServerFunctions.Benchmarks -c Release

      - name: Run benchmarks
        run: >
          dotnet run -c Release --project tests/BlazorServerFunctions.Benchmarks --no-build
          -- --exporters json --artifacts ./benchmark-artifacts

      - name: Store FullGenerationBenchmarks results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: benchmarkdotnet
          output-file-path: ./benchmark-artifacts/results/BlazorServerFunctions.Benchmarks.FullGenerationBenchmarks-report.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: true
          alert-threshold: '150%'
          fail-on-alert: true

      - name: Store IncrementalGenerationBenchmarks results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: benchmarkdotnet
          output-file-path: ./benchmark-artifacts/results/BlazorServerFunctions.Benchmarks.IncrementalGenerationBenchmarks-report.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: true
          alert-threshold: '150%'
          fail-on-alert: true

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: benchmark-artifacts/results/
