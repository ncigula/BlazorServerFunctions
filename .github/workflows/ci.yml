name: CI

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.slnx'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
  pull_request:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.slnx'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build
        run: dotnet build BlazorServerFunctions.slnx -c Release

      - name: Test
        run: >
          dotnet test BlazorServerFunctions.slnx
          -c Release
          --no-build
          --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/*.trx"
