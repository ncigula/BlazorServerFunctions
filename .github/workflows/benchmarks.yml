name: Benchmarks

on:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'tests/BlazorServerFunctions.Benchmarks/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
  workflow_dispatch:

permissions:
  # Required for github-action-benchmark to push results to gh-pages
  contents: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  benchmark:
    name: Run ${{ matrix.benchmark }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        benchmark:
          - FullGenerationBenchmarks
          - IncrementalGenerationBenchmarks

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run benchmarks
        run: >
          dotnet run --configuration Release
          --project tests/BlazorServerFunctions.Benchmarks
          --filter '*${{ matrix.benchmark }}*'
          --exporters json
          --artifacts ./benchmark-artifacts

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: benchmarkdotnet
          output-file-path: ./benchmark-artifacts/results/BlazorServerFunctions.Benchmarks.${{ matrix.benchmark }}-report.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: true
          alert-threshold: '150%'
          fail-on-alert: true

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results-${{ matrix.benchmark }}
          path: benchmark-artifacts/results/
